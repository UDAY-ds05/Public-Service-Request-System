<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login — PSRS</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <!-- ═══ LEFT PANEL — branding + video ═══ -->
  <div class="left-panel">

    <div class="brand">
      <div class="brand-icon">⚙</div>
      <span class="brand-name">Public Service Request System</span>
    </div>

    <!-- ► INSERT YOUR VIDEO HERE ◄
         Replace the .video-placeholder div with:
         <video src="your-video.mp4" autoplay muted loop playsinline></video>
         or an <iframe> embed -->
    <div class="video-wrapper">
  <video autoplay muted loop playsinline class="bg-video">
    <source src="login.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

    <p class="tagline">Manage the system.<br><em>Keep the city running.</em></p>
    <p class="sub">Admin portal — full control over users,<br>departments and service requests.</p>

  </div>

  <!-- ═══ RIGHT PANEL — form ═══ -->
  <div class="right-panel">
    <div class="form-box">

      <div class="role-badge">🛡️ &nbsp;Admin Portal</div>
      <h2>Admin Login</h2>
      <p class="form-subtitle">Sign in with your administrator credentials to continue.</p>

      <form id="loginForm" action="/MyWebApp/LoginServlet" method="post">

        <input type="hidden" name="loginType" value="ADMIN">

        <label for="username">Admin Username</label>
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" id="username" name="username"
                 placeholder="Enter admin username" required>
        </div>

        <label for="password">Password</label>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" name="password"
                 placeholder="Enter your password" required>
        </div>

        <button type="submit"><span>Sign In</span></button>

      </form>

      <div class="register-row">
        <p>Don't have an account?</p>
        <a href="../../registration/html/registration_page.html">
          <button type="button">Create Account</button>
        </a>
      </div>

    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value.trim();
      if (u === "" || p === "") {
        e.preventDefault();
        alert("Please enter both username and password!");
      }
    });
  </script>
  <script src="login.js"></script>

</body>
</html>
